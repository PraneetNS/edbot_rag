<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edmentor — Your Engineering Mentor</title>
  <meta name="description" content="Edmentor is a voice-first AI engineering mentor for 2nd, 3rd, and 4th year students. Ask anything about DSA, placements, resume, career, and projects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07080f;
      --surface:      #0d0f1a;
      --card:         #12141f;
      --card-hover:   #171926;
      --sidebar-bg:   #0a0c17;
      --border:       rgba(255,255,255,0.07);
      --border-glow:  rgba(124, 58, 237, 0.35);
      --accent:       #7c3aed;
      --accent-light: #a78bfa;
      --accent2:      #f59e0b;
      --accent2-muted:rgba(245,158,11,0.12);
      --text:         #f1f5f9;
      --text-muted:   #64748b;
      --text-dim:     #94a3b8;
      --success:      #10b981;
      --error:        #ef4444;
      --font-ui:      'Inter', sans-serif;
      --font-title:   'Plus Jakarta Sans', sans-serif;
      --radius-lg:    20px;
      --radius-md:    14px;
      --radius-sm:    8px;
      --sidebar-w:    260px;
    }

    html, body { height: 100%; font-family: var(--font-ui); background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Background orbs ─────────────────────────────────────────── */
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .bg-orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%); top: -120px; left: -100px; animation: orb-drift 18s ease-in-out infinite alternate; }
    .bg-orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 70%); bottom: -80px; right: -60px; animation: orb-drift 22s ease-in-out infinite alternate-reverse; }
    @keyframes orb-drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.08); } }

    /* ── App shell ───────────────────────────────────────────────── */
    .app-shell {
      position: relative; z-index: 1;
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: 50;
    }

    .sidebar-head {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(124,58,237,.3);
      flex-shrink: 0;
    }

    .sidebar-brand {
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(to right, #f1f5f9, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-new-chat {
      margin: 12px 12px 8px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px dashed rgba(124,58,237,.4);
      background: rgba(124,58,237,.06);
      color: var(--accent-light);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all .2s;
      font-family: var(--font-ui);
    }
    .btn-new-chat:hover { background: rgba(124,58,237,.13); border-color: rgba(124,58,237,.65); }

    .session-list-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      padding: 8px 16px 4px;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .session-list::-webkit-scrollbar { width: 3px; }
    .session-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.07); border-radius: 4px; }

    .session-item {
      display: flex; align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .session-item:hover { background: rgba(255,255,255,.04); }
    .session-item.active { background: rgba(124,58,237,.12); }
    .session-item.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; height: 60%;
      width: 3px; border-radius: 0 3px 3px 0;
      background: var(--accent);
    }

    .session-icon { font-size: 14px; flex-shrink: 0; }

    .session-info { flex: 1; min-width: 0; }
    .session-title { font-size: 12.5px; font-weight: 500; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-meta  { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }

    .session-del {
      opacity: 0;
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all .15s;
      flex-shrink: 0;
    }
    .session-item:hover .session-del { opacity: 1; }
    .session-del:hover { color: var(--error); }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px;
    }

    .profile-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s;
    }
    .profile-row:hover { background: rgba(255,255,255,.04); }

    .profile-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .profile-info { flex: 1; min-width: 0; }
    .profile-name { font-size: 12.5px; font-weight: 600; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-year { font-size: 10.5px; color: var(--text-muted); }

    .profile-chevron { font-size: 11px; color: var(--text-muted); }

    /* ── Main panel ──────────────────────────────────────────────── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      background: rgba(7,8,15,.7);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .btn-sidebar-toggle {
      display: none;
      width: 34px; height: 34px;
      border-radius: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text-muted);
      cursor: pointer;
      align-items: center; justify-content: center;
      font-size: 16px;
    }

    .session-name-display {
      font-size: 14px; font-weight: 600; color: var(--text-dim);
    }

    .header-right {
      display: flex; align-items: center; gap: 10px;
    }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      font-size: 11px; font-weight: 500; color: var(--text-muted);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
    .status-dot.online  { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse-dot 2.5s infinite; }
    .status-dot.fallback { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse-dot 2.5s infinite; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .btn-icon {
      width: 34px; height: 34px;
      border-radius: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all .2s;
    }
    .btn-icon:hover { border-color: rgba(255,255,255,.15); color: var(--text); background: rgba(255,255,255,.06); }

    /* ── Profile dropdown ────────────────────────────────────────── */
    .profile-btn-wrap { position: relative; }

    .profile-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      border: 2px solid rgba(124,58,237,.4);
      color: #fff;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .profile-btn:hover { transform: scale(1.07); box-shadow: 0 0 14px rgba(124,58,237,.45); }

    .profile-dropdown {
      position: absolute; top: 44px; right: 0;
      width: 210px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: 0 20px 50px rgba(0,0,0,.6);
      overflow: hidden;
      display: none;
      animation: fade-drop .18s ease;
      z-index: 100;
    }
    @keyframes fade-drop { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .profile-dropdown.open { display: block; }

    .dd-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .dd-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .dd-year { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .dd-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      font-size: 13px; color: var(--text-dim);
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
    }
    .dd-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
    .dd-item.danger:hover { background: rgba(239,68,68,.08); color: var(--error); }
    .dd-icon { font-size: 15px; }

    /* ── Messages area ───────────────────────────────────────────── */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      scroll-behavior: smooth;
      align-items: center;
    }
    .messages-wrap > * {
      width: 100%;
      max-width: 880px;
      flex-shrink: 0;
    }
    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 4px; }

    /* ── Welcome screen ──────────────────────────────────────────── */
    .welcome-screen {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 24px; padding: 20px;
      animation: fade-up .6s cubic-bezier(.16,1,.3,1);
      margin: 0 auto;
      width: 100%;
    }
    @keyframes fade-up { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    .welcome-avatar {
      width: 82px; height: 82px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(79,70,229,.08));
      border: 1px solid rgba(124,58,237,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      animation: float 5s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(124,58,237,.08), inset 0 1px 0 rgba(255,255,255,.06);
      margin: 0 auto;
    }
    @keyframes float { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-10px) rotate(1deg); } }

    .welcome-screen h2 {
      font-family: var(--font-title); font-size: 26px; font-weight: 800; letter-spacing: -.5px;
      background: linear-gradient(135deg, #f1f5f9 0%, #a78bfa 60%, #f59e0b 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
      margin: 0 auto;
    }
    .welcome-greeting { font-size: 13px; color: var(--accent2); font-weight: 500; margin-bottom: -8px; text-align: center; margin-left: auto; margin-right: auto; }
    .welcome-screen p { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 380px; text-align: center; margin: 0 auto; }

    .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 480px; margin: 0 auto; }
    .chip {
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 12.5px; padding: 7px 14px;
      border-radius: 20px; cursor: pointer; transition: all .2s;
    }
    .chip:hover { border-color: rgba(124,58,237,.4); background: rgba(124,58,237,.06); color: var(--accent-light); transform: translateY(-1px); }

    /* ── Message bubbles ─────────────────────────────────────────── */
    .msg-row { display: flex; gap: 12px; animation: msg-in .32s cubic-bezier(.16,1,.3,1); }
    @keyframes msg-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.bot  { }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; margin-top: 2px;
    }
    .msg-row.user .msg-avatar { background: linear-gradient(135deg, var(--accent), #4f46e5); box-shadow: 0 2px 10px rgba(124,58,237,.25); }
    .msg-row.bot  .msg-avatar { background: linear-gradient(135deg, #1e2030, #131526); border: 1px solid var(--border); }

    .msg-body { display: flex; flex-direction: column; gap: 5px; max-width: 80%; }
    .msg-row.user .msg-body { align-items: flex-end; }
    .msg-row.bot  .msg-body { align-items: flex-start; }

    .bubble { padding: 13px 17px; border-radius: 18px; font-size: 14.5px; line-height: 1.65; }
    .msg-row.user .bubble { background: linear-gradient(135deg, var(--accent), #4f46e5); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 4px 16px rgba(124,58,237,.15); }
    .msg-row.bot  .bubble { background: var(--card); border: 1px solid var(--border); color: var(--text-dim); border-bottom-left-radius: 4px; }

    .msg-meta { display: flex; align-items: center; gap: 8px; font-size: 10.5px; color: var(--text-muted); padding: 0 4px; }
    .duration-badge { background: var(--accent2-muted); border: 1px solid rgba(245,158,11,.15); color: var(--accent2); padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .topic-badge { background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.2); color: var(--accent-light); padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }

    .btn-play { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; transition: color .2s; }
    .btn-play:hover { color: var(--accent-light); }
    .btn-play.playing { color: var(--accent); animation: speaking-pulse 1s infinite; }
    @keyframes speaking-pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* ── Typing indicator ────────────────────────────────────────── */
    .typing-row { display: flex; gap: 12px; }
    .typing-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; padding: 13px 18px; display: flex; align-items: center; gap: 6px; }
    .typing-label { font-size: 12px; color: var(--text-muted); }
    .dots { display: flex; gap: 4px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes dot-bounce { 0%,80%,100% { transform:translateY(0); opacity:.4; } 40% { transform:translateY(-6px); opacity:1; } }

    /* ── Input zone ──────────────────────────────────────────────── */
    .input-zone { padding: 16px 24px 22px; border-top: 1px solid var(--border); background: rgba(7,8,15,.8); backdrop-filter: blur(20px); flex-shrink: 0; }
    .input-container {
      max-width: 880px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }
    .input-row { display: flex; align-items: flex-end; gap: 10px; }

    .input-box {
      flex: 1;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 11px 14px;
      display: flex; align-items: flex-end; gap: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within { border-color: rgba(124,58,237,.5); box-shadow: 0 0 0 3px rgba(124,58,237,.1); }

    #text-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font-ui); font-size: 14.5px;
      line-height: 1.5; resize: none; max-height: 120px; padding-top: 2px;
    }
    #text-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 32px; height: 32px; border-radius: 9px; border: none;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      transition: all .2s; box-shadow: 0 2px 10px rgba(124,58,237,.3);
    }
    #send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(124,58,237,.4); }
    #send-btn:disabled { opacity: .25; cursor: not-allowed; transform: none; box-shadow: none; }

    #mic-btn {
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px solid rgba(124,58,237,.3);
      background: linear-gradient(135deg, rgba(124,58,237,.12), rgba(79,70,229,.06));
      color: var(--accent-light); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0; transition: all .25s;
    }
    #mic-btn:hover { border-color: var(--accent); background: rgba(124,58,237,.18); transform: scale(1.05); }
    #mic-btn.listening { background: rgba(239,68,68,.15); border-color: #ef4444; color: #ef4444; animation: mic-pulse 1.2s infinite; }
    @keyframes mic-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }

    .stt-live { min-height: 16px; font-size: 12px; color: var(--accent-light); text-align: center; margin-top: 6px; opacity: 0; transition: opacity .2s; font-style: italic; }
    .stt-live.visible { opacity: 1; }
    .input-hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .input-hint kbd { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); border-radius: 4px; padding: 1px 5px; font-size: 10px; font-family: var(--font-ui); }

    /* ── Waveform ────────────────────────────────────────────────── */
    .waveform-bar { display: none; align-items: center; justify-content: center; gap: 3px; height: 18px; margin-bottom: 4px; }
    .waveform-bar.active { display: flex; }
    .wave-line { width: 3px; border-radius: 2px; background: var(--accent-light); animation: wave-anim .8s ease-in-out infinite alternate; }
    .wave-line:nth-child(2) { animation-delay: .1s; } .wave-line:nth-child(3) { animation-delay: .2s; } .wave-line:nth-child(4) { animation-delay: .3s; } .wave-line:nth-child(5) { animation-delay: .4s; }
    @keyframes wave-anim { from { height:4px; opacity:.4; } to { height:18px; opacity:1; } }

    /* ── Mute button ─────────────────────────────────────────────── */
    #mute-btn {
      position: fixed; bottom: 90px; right: 18px;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all .2s; z-index: 10;
    }
    #mute-btn:hover { border-color: rgba(255,255,255,.15); color: var(--text); }
    #mute-btn.muted { color: var(--error); border-color: rgba(239,68,68,.3); }

    }
    
    /* ── Show Blocks ────────────────────────────────────────────── */
    .show-block {
      width: 100%;
      margin-top: 10px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      font-size: 13.5px;
      line-height: 1.5;
      animation: msg-in .3s ease;
    }

    /* Code Block */
    .show-block-code {
      background: #090a10;
      border-color: rgba(124,58,237,0.15);
      position: relative;
    }
    .code-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 11.5px; color: var(--text-muted);
      font-family: monospace;
    }
    .code-body {
      padding: 14px; overflow-x: auto;
      font-family: 'Courier New', Courier, monospace;
      color: #e2e8f0; white-space: pre;
    }
    .btn-copy {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px; color: var(--text-dim); padding: 3px 8px;
      font-size: 11px; cursor: pointer; transition: all 0.2s;
    }
    .btn-copy:hover {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    /* Roadmap Block */
    .show-block-roadmap {
      background: linear-gradient(135deg, rgba(124,58,237,0.07), rgba(79,70,229,0.03));
      border: 1px solid rgba(124,58,237,0.25);
      padding: 16px;
      color: var(--text-dim);
      white-space: pre-wrap;
      box-shadow: 0 4px 20px rgba(124,58,237,0.05);
    }
    .roadmap-title {
      font-family: var(--font-title); font-weight: 700; color: var(--accent-light);
      font-size: 14.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }

    /* Workflow Block */
    .show-block-workflow {
      background: linear-gradient(135deg, rgba(245,158,11,0.05), rgba(7,8,15,0.2));
      border: 1px solid rgba(245,158,11,0.2);
      padding: 16px;
      box-shadow: 0 4px 20px rgba(245,158,11,0.03);
    }
    .workflow-title {
      font-family: var(--font-title); font-weight: 700; color: var(--accent2);
      font-size: 14.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .workflow-steps {
      display: flex; flex-direction: column; gap: 10px;
    }
    .workflow-step {
      display: flex; gap: 12px; align-items: flex-start;
    }
    .step-number {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent2); color: #000; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      font-size: 11.5px; flex-shrink: 0; margin-top: 1px;
    }
    .step-text {
      color: var(--text-dim); font-size: 13.5px; line-height: 1.5;
    }

    /* Table Block */
    .show-block-table {
      border-color: rgba(255,255,255,0.08);
      overflow-x: auto;
    }
    .table-container {
      width: 100%; border-collapse: collapse; text-align: left;
    }
    .table-container th {
      background: rgba(255,255,255,0.04);
      padding: 10px 14px; font-weight: 600; font-size: 12px;
      color: var(--text); border-bottom: 1px solid var(--border);
    }
    .table-container td {
      padding: 10px 14px; font-size: 12.5px; color: var(--text-dim);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .table-container tr:nth-child(even) {
      background: rgba(255,255,255,0.015);
    }
    .table-container tr:hover {
      background: rgba(255,255,255,0.03);
    }

    /* Checklist Block */
    .show-block-checklist {
      padding: 16px;
      background: rgba(255,255,255,0.01);
    }
    .checklist-title {
      font-family: var(--font-title); font-weight: 700; color: var(--text);
      font-size: 14px; margin-bottom: 12px;
    }
    .checklist-items {
      display: flex; flex-direction: column; gap: 8px;
    }
    .checklist-item {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      user-select: none;
    }
    .checklist-item input[type="checkbox"] {
      width: 16px; height: 16px; border-radius: 4px;
      accent-color: var(--accent); cursor: pointer;
    }
    .checklist-item-text {
      color: var(--text-dim); font-size: 13.5px; transition: color 0.15s;
    }
    .checklist-item input[type="checkbox"]:checked + .checklist-item-text {
      text-decoration: line-through; color: var(--text-muted);
    }
    
    /* ── Mobile sidebar overlay ──────────────────────────────────── */
    @media (max-width: 700px) {
      .sidebar {
        position: fixed; left: 0; top: 0; height: 100%;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 30px rgba(0,0,0,.6); }
      .btn-sidebar-toggle { display: flex !important; }
      .main-panel { max-width: 100%; }
      .messages-wrap { padding: 18px 16px; }
      .input-zone { padding: 12px 16px 18px; }
      #mute-btn { bottom: 80px; right: 12px; }
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app-shell">

  <!-- ── SIDEBAR ──────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">🎓</div>
      <span class="sidebar-brand">Edmentor</span>
    </div>

    <button class="btn-new-chat" id="new-chat-btn" onclick="newChat()">
      <span>✦</span> New Chat
    </button>

    <div class="session-list-label">Recent Chats</div>
    <div class="session-list" id="session-list"></div>

    <!-- Profile row at bottom of sidebar -->
    <div class="sidebar-footer">
      <div class="profile-row" onclick="goToDashboard()">
        <div class="profile-avatar" id="sb-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="sb-name">Loading…</div>
          <div class="profile-year" id="sb-year">View Dashboard →</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── MAIN PANEL ────────────────────────────────────────────────────── -->
  <div class="main-panel">

    <!-- Header -->
    <header>
      <div class="header-left">
        <button class="btn-sidebar-toggle btn-icon" id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <span class="session-name-display" id="session-name-display">New Chat</span>
      </div>
      <div class="header-right">
        <div class="status-pill" id="status-pill">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-label">Connecting…</span>
        </div>
        <button class="btn-icon" id="clear-btn" title="Clear this chat" onclick="clearConversation()">🗑️</button>

        <!-- Profile dropdown -->
        <div class="profile-btn-wrap" id="profile-btn-wrap">
          <button class="profile-btn" id="profile-btn" onclick="toggleDropdown()">?</button>
          <div class="profile-dropdown" id="profile-dropdown">
            <div class="dd-header">
              <div class="dd-name" id="dd-name">—</div>
              <div class="dd-year" id="dd-year">—</div>
            </div>
            <a class="dd-item" onclick="goToDashboard()"><span class="dd-icon">📊</span> My Dashboard</a>
            <a class="dd-item" onclick="newChat()"><span class="dd-icon">✦</span> New Chat</a>
            <a class="dd-item danger" onclick="logout()"><span class="dd-icon">🚪</span> Logout</a>
          </div>
        </div>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages-wrap" id="messages"></div>

    <!-- Waveform -->
    <div class="waveform-bar" id="waveform">
      <div class="wave-line" style="height:8px"></div>
      <div class="wave-line" style="height:14px"></div>
      <div class="wave-line" style="height:18px"></div>
      <div class="wave-line" style="height:12px"></div>
      <div class="wave-line" style="height:6px"></div>
    </div>

    <!-- Input zone -->
    <div class="input-zone">
      <div class="input-container">
        <div class="input-row">
          <div class="input-box">
            <textarea id="text-input" rows="1" placeholder="Ask anything about DSA, placements, resume…"></textarea>
            <button id="send-btn" onclick="sendMessage()" disabled title="Send">➤</button>
          </div>
          <button id="mic-btn" onclick="toggleMic()" title="Tap to speak (2.5s silence auto-sends)">🎤</button>
        </div>
        <div class="stt-live" id="stt-live"></div>
        <div class="input-hint">
          <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> new line · Mic auto-sends after 2.5s silence
        </div>
      </div>
    </div>

  </div><!-- /main-panel -->
</div><!-- /app-shell -->

<button id="mute-btn" onclick="toggleMute()" title="Toggle voice output">🔊</button>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  EDMENTOR — FULL APP  (auth + sessions + chat)
// ═══════════════════════════════════════════════════════════════════════════

const API_BASE    = '';
const TOKEN_KEY   = 'edmentor_token';
const SESSIONS_KEY= 'edmentor_sessions';   // [{id, name, history, ts}]
const ACTIVE_KEY  = 'edmentor_active_sid';
const MUTE_KEY    = 'edmentor_muted';

// ── Auth gate ─────────────────────────────────────────────────────────────
let _token = localStorage.getItem(TOKEN_KEY);
if (!_token) { window.location.href = '/login.html'; throw 'unauthenticated'; }

let _me = {};   // {student_id, username, year}

// ── Session management ────────────────────────────────────────────────────
function _loadSessions() {
  try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
}
function _saveSessions(s) {
  try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(s)); } catch {}
}
function _newSid() { return 'em_' + Math.random().toString(36).slice(2,9) + '_' + Date.now(); }

let sessions   = _loadSessions();
let activeSid  = localStorage.getItem(ACTIVE_KEY) || null;

// Ensure there is always at least one session
if (sessions.length === 0) {
  const s = { id: _newSid(), name: 'New Chat', history: [], ts: Date.now() };
  sessions.push(s);
  _saveSessions(sessions);
}
// Ensure active session is valid
if (!activeSid || !sessions.find(s => s.id === activeSid)) {
  activeSid = sessions[0].id;
}
localStorage.setItem(ACTIVE_KEY, activeSid);

function _getActive() { return sessions.find(s => s.id === activeSid) || sessions[0]; }

// ── UI state ──────────────────────────────────────────────────────────────
let isMuted       = localStorage.getItem(MUTE_KEY) === 'true';
let isListening   = false;
let isSending     = false;
let recognition   = null;
let silenceTimer  = null;

let audioQueue      = [];
let isPlayingAudio  = false;
let currentPlayingAudio = null;
let speechQueue     = [];
let isSpeakingQueue = false;
let revealedText    = '';
let streamClosed    = false;
let currentBubbleEl = null;
let currentPlayBtn  = null;
let revealQueue     = [];
let revealTimer     = null;

// ── DOM refs ──────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const textInput   = document.getElementById('text-input');
const sendBtn     = document.getElementById('send-btn');
const micBtn      = document.getElementById('mic-btn');
const sttLive     = document.getElementById('stt-live');
const statusDot   = document.getElementById('status-dot');
const statusLabel = document.getElementById('status-label');
const muteBtn     = document.getElementById('mute-btn');
const waveform    = document.getElementById('waveform');
const sidebar     = document.getElementById('sidebar');

// ── Boot ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  // Validate token / load identity
  try {
    const res = await apiFetch('/auth/me');
    if (!res.ok) { clearAndRedirect(); return; }
    _me = await res.json();
  } catch { clearAndRedirect(); return; }

  // Populate profile UI
  const initial = (_me.username || '?')[0].toUpperCase();
  document.getElementById('profile-btn').textContent = initial;
  document.getElementById('sb-avatar').textContent   = initial;
  document.getElementById('sb-name').textContent     = _me.username || 'Student';
  document.getElementById('dd-name').textContent     = _me.username || 'Student';
  document.getElementById('dd-year').textContent     = _me.year    || 'Engineering Student';
  document.getElementById('sb-year').textContent     = 'View Dashboard →';

  updateMuteUI();
  checkHealth();
  setInterval(checkHealth, 15000);
  renderSessions();
  loadSession(activeSid);

  textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = textInput.value.trim().length === 0;
  });
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', e => {
    const wrap = document.getElementById('profile-btn-wrap');
    if (!wrap.contains(e.target)) document.getElementById('profile-dropdown').classList.remove('open');
  });
});

function apiFetch(path, opts = {}) {
  return fetch(API_BASE + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + _token, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
}

function clearAndRedirect() {
  localStorage.removeItem(TOKEN_KEY);
  window.location.href = '/login.html';
}

function logout() { clearAndRedirect(); }

function goToDashboard() {
  window.location.href = '/dashboard.html';
}

// ── Dropdown ──────────────────────────────────────────────────────────────
function toggleDropdown() {
  document.getElementById('profile-dropdown').classList.toggle('open');
}

// ── Sidebar toggle (mobile) ───────────────────────────────────────────────
function toggleSidebar() {
  sidebar.classList.toggle('open');
}

// ── Session list rendering ────────────────────────────────────────────────
function renderSessions() {
  const list = document.getElementById('session-list');
  const sorted = [...sessions].sort((a, b) => b.ts - a.ts);
  list.innerHTML = sorted.map(s => {
    const preview = s.history.length
      ? (s.history[s.history.length - 1].text || '').slice(0, 32) + '…'
      : 'No messages yet';
    const when = _relativeTime(s.ts);
    return `
      <div class="session-item${s.id === activeSid ? ' active' : ''}" onclick="loadSession('${s.id}')">
        <span class="session-icon">💬</span>
        <div class="session-info">
          <div class="session-title">${escapeHtml(s.name)}</div>
          <div class="session-meta">${when}</div>
        </div>
        <button class="session-del" onclick="deleteSession(event,'${s.id}')" title="Delete">✕</button>
      </div>`;
  }).join('');
}

function _relativeTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}

function loadSession(sid) {
  activeSid = sid;
  localStorage.setItem(ACTIVE_KEY, sid);
  const sess = _getActive();
  document.getElementById('session-name-display').textContent = sess.name;
  renderSessions();
  renderAll(sess.history);
  // Close mobile sidebar
  sidebar.classList.remove('open');
}

function newChat() {
  const s = { id: _newSid(), name: 'New Chat', history: [], ts: Date.now() };
  sessions.unshift(s);
  _saveSessions(sessions);
  loadSession(s.id);
}

function deleteSession(e, sid) {
  e.stopPropagation();
  if (!confirm('Delete this chat?')) return;
  sessions = sessions.filter(s => s.id !== sid);
  if (sessions.length === 0) {
    const s = { id: _newSid(), name: 'New Chat', history: [], ts: Date.now() };
    sessions.push(s);
  }
  _saveSessions(sessions);
  if (activeSid === sid) loadSession(sessions[0].id);
  else renderSessions();
  // Server-side clear
  fetch(`${API_BASE}/edmentor/session/${sid}`, {
    method: 'DELETE', headers: { 'Authorization': 'Bearer ' + _token }
  }).catch(() => {});
}

function _updateActiveSession(history) {
  const sess = _getActive();
  sess.history = history;
  sess.ts = Date.now();
  // Auto-name from first user message
  if (sess.name === 'New Chat') {
    const first = history.find(h => h.role === 'user');
    if (first) sess.name = first.text.slice(0, 36) + (first.text.length > 36 ? '…' : '');
  }
  _saveSessions(sessions);
  document.getElementById('session-name-display').textContent = sess.name;
  renderSessions();
}

// ── Health check ──────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const res  = await fetch(`${API_BASE}/edmentor/health`);
    const data = await res.json();
    if (data.ready && data.qwen_available) {
      statusDot.className = 'status-dot online'; statusLabel.textContent = 'Qwen Local';
    } else if (data.ready) {
      statusDot.className = 'status-dot fallback'; statusLabel.textContent = 'RAG Local';
    } else {
      statusDot.className = 'status-dot'; statusLabel.textContent = 'Offline';
    }
  } catch {
    statusDot.className = 'status-dot'; statusLabel.textContent = 'Offline';
  }
}

// ── Render messages ───────────────────────────────────────────────────────
function renderAll(history) {
  messagesEl.innerHTML = '';
  if (!history || history.length === 0) { renderWelcome(); return; }
  history.forEach(msg => appendBubble(msg));
  scrollBottom();
}

function renderWelcome() {
  const el = document.createElement('div');
  el.className = 'welcome-screen';
  el.id = 'welcome-screen';
  const greeting = _me.username ? `Hey ${_me.username} 👋` : 'Hey there 👋';
  el.innerHTML = `
    <div class="welcome-avatar">🎓</div>
    <div class="welcome-greeting">${greeting}</div>
    <h2>Your engineering mentor is ready.</h2>
    <p>Ask me anything about DSA, placements, resume, career planning, or internships. I'll guide you like a senior engineer.</p>
    <div class="welcome-chips">
      <div class="chip" onclick="quickAsk('how do I start with DSA?')">How to start DSA?</div>
      <div class="chip" onclick="quickAsk('what should I do in my 3rd year?')">3rd year roadmap</div>
      <div class="chip" onclick="quickAsk('how do I get my first internship?')">First internship</div>
      <div class="chip" onclick="quickAsk('what projects should I build?')">Project ideas</div>
      <div class="chip" onclick="quickAsk('how do I crack placements?')">Crack placements</div>
      <div class="chip" onclick="quickAsk('should I do masters or get a job?')">Masters vs job</div>
    </div>`;
  messagesEl.appendChild(el);
}

function quickAsk(text) {
  textInput.value = text;
  sendBtn.disabled = false;
  sendMessage();
}

// ── Bubble ────────────────────────────────────────────────────────────────
function appendBubble(msg) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;
  const avatarEmoji = msg.role === 'user' ? '👤' : '🎓';
  const metaHtml = buildMeta(msg);
  
  let bubbleHtml = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
  let showsHtml = '';
  if (msg.shows && msg.shows.length > 0) {
    showsHtml = msg.shows.map(show => renderShowBlock(show)).join('');
  }
  
  row.innerHTML = `
    <div class="msg-avatar">${avatarEmoji}</div>
    <div class="msg-body">
      ${bubbleHtml}
      ${showsHtml}
      ${metaHtml}
    </div>`;
    
  if (msg.role === 'bot') {
    const playBtn = row.querySelector('.btn-play');
    if (playBtn) playBtn.addEventListener('click', () => speakText(msg.text, playBtn));
  }
  messagesEl.appendChild(row);
  return row;
}

function renderShowBlock(show) {
  const type = show.type || 'code';
  const lang = show.lang || '';
  const content = show.content || '';
  
  if (type === 'code') {
    return `
      <div class="show-block show-block-code">
        <div class="code-header">
          <span>${escapeHtml(lang || 'code')}</span>
          <button class="btn-copy" onclick="copyToClipboard(this)">Copy</button>
        </div>
        <pre class="code-body">${escapeHtml(content)}</pre>
      </div>`;
  }
  
  if (type === 'roadmap') {
    return `
      <div class="show-block show-block-roadmap">
        <div class="roadmap-title">📍 Roadmap / Learning Path</div>
        <div>${content.replace(/\n/g, '<br>')}</div>
      </div>`;
  }
  
  if (type === 'workflow') {
    const steps = content.split('\n').map(line => line.trim()).filter(Boolean);
    let stepsHtml = '';
    steps.forEach((step, idx) => {
      const text = step.replace(/^\d+[\.\-\s]*/, '');
      stepsHtml += `
        <div class="workflow-step">
          <div class="step-number">${idx + 1}</div>
          <div class="step-text">${escapeHtml(text)}</div>
        </div>`;
    });
    return `
      <div class="show-block show-block-workflow">
        <div class="workflow-title">⚙️ Step-by-Step Workflow</div>
        <div class="workflow-steps">${stepsHtml}</div>
      </div>`;
  }
  
  if (type === 'table') {
    const lines = content.split('\n').map(line => line.trim()).filter(Boolean);
    if (lines.length > 0) {
      let tableHtml = '<table class="table-container">';
      let hasHeader = false;
      
      lines.forEach(line => {
        if (line.match(/^\|?\s*:?-+:?\s*\|/)) return;
        
        const cells = line.split('|').map(c => c.trim());
        if (cells.length > 0 && cells[0] === '') cells.shift();
        if (cells.length > 0 && cells[cells.length - 1] === '') cells.pop();
        
        if (cells.length === 0) return;
        
        tableHtml += '<tr>';
        cells.forEach(cell => {
          if (!hasHeader) {
            tableHtml += `<th>${escapeHtml(cell)}</th>`;
          } else {
            tableHtml += `<td>${escapeHtml(cell)}</td>`;
          }
        });
        tableHtml += '</tr>';
        hasHeader = true;
      });
      
      tableHtml += '</table>';
      return `
        <div class="show-block show-block-table">
          ${tableHtml}
        </div>`;
    }
  }
  
  if (type === 'checklist') {
    const items = content.split('\n').map(line => line.trim()).filter(Boolean);
    let itemsHtml = '';
    items.forEach((item, idx) => {
      const text = item.replace(/^([-\*\+]\s*|\[\s*\]\s*)/, '');
      itemsHtml += `
        <label class="checklist-item">
          <input type="checkbox" onchange="toggleChecklistItem(this)" />
          <span class="checklist-item-text">${escapeHtml(text)}</span>
        </label>`;
    });
    return `
      <div class="show-block show-block-checklist">
        <div class="checklist-title">📋 Preparation Checklist</div>
        <div class="checklist-items">${itemsHtml}</div>
      </div>`;
  }
  
  return `<div class="show-block" style="padding:14px;">${escapeHtml(content)}</div>`;
}

function copyToClipboard(btn) {
  const codeBody = btn.closest('.show-block-code').querySelector('.code-body');
  if (!codeBody) return;
  const text = codeBody.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  }).catch(() => {
    btn.textContent = 'Failed';
  });
}

function toggleChecklistItem(checkbox) {
  // checked CSS styles handle checking visually
}

function buildMeta(msg) {
  if (msg.role === 'user') return `<div class="msg-meta">${msg.time}</div>`;
  const durationHtml = msg.duration ? `<span class="duration-badge">${msg.duration}</span>` : '';
  const topicHtml = msg.topic && msg.topic !== 'General' && msg.topic !== 'general'
    ? `<span class="topic-badge">${msg.topic}</span>` : '';
  return `<div class="msg-meta">${msg.time}${durationHtml}${topicHtml}<button class="btn-play" title="Play response">▶</button></div>`;
}

// ── Typing indicator ──────────────────────────────────────────────────────
function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing-row'; el.id = 'typing-indicator';
  el.innerHTML = `
    <div class="msg-avatar" style="background:linear-gradient(135deg,#1e2030,#131526);border:1px solid rgba(255,255,255,0.07);">🎓</div>
    <div class="typing-bubble">
      <span class="typing-label">Edmentor is thinking</span>
      <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>`;
  messagesEl.appendChild(el);
  scrollBottom();
}
function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

// ── Audio queue ───────────────────────────────────────────────────────────
function queueAudio(b64) {
  if (isMuted) return;
  try {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes], { type: 'audio/wav' }));
    audioQueue.push(url);
    if (!isPlayingAudio) playNextAudio();
  } catch {}
}

function playNextAudio() {
  if (!audioQueue.length) { isPlayingAudio = false; waveform.classList.remove('active'); document.querySelectorAll('.btn-play.playing').forEach(b => b.classList.remove('playing')); return; }
  if (window.speechSynthesis && window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  isPlayingAudio = true; waveform.classList.add('active');
  const url = audioQueue.shift();
  const audio = new Audio(url); currentPlayingAudio = audio;
  const playBtns = document.querySelectorAll('.btn-play');
  const lastBtn = playBtns[playBtns.length - 1];
  if (lastBtn) lastBtn.classList.add('playing');
  audio.onended = () => { URL.revokeObjectURL(url); currentPlayingAudio = null; playNextAudio(); };
  audio.onerror = () => { URL.revokeObjectURL(url); currentPlayingAudio = null; playNextAudio(); };
  audio.play().catch(() => { URL.revokeObjectURL(url); currentPlayingAudio = null; playNextAudio(); });
}

function stopPlayingAudio() {
  if (currentPlayingAudio) { currentPlayingAudio.pause(); currentPlayingAudio = null; }
  audioQueue = []; isPlayingAudio = false; waveform.classList.remove('active');
  document.querySelectorAll('.btn-play.playing').forEach(b => b.classList.remove('playing'));
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const q = textInput.value.trim();
  if (!q || isSending) return;

  isSending = true; sendBtn.disabled = true;
  textInput.value = ''; textInput.style.height = 'auto';

  const ws = document.getElementById('welcome-screen'); if (ws) ws.remove();

  const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const sess = _getActive();

  const userMsg = { role: 'user', text: q, time: timeStr };
  sess.history.push(userMsg);
  _updateActiveSession(sess.history);
  appendBubble(userMsg);
  scrollBottom();
  showTyping();

  try {
    stopSpeaking();

    const botPlaceholder = { role: 'bot', text: '', time: timeStr, topic: '', duration: '' };
    const botRow = appendBubble(botPlaceholder);
    const bubbleEl = botRow.querySelector('.bubble');
    bubbleEl.innerText = '';

    speechQueue = []; isSpeakingQueue = false; revealedText = ''; streamClosed = false;
    currentBubbleEl = bubbleEl; currentPlayBtn = null; revealQueue = [];
    if (revealTimer) { clearInterval(revealTimer); revealTimer = null; }

    hideTyping();

    const streamUrl = `${API_BASE}/edmentor/query/stream?question=${encodeURIComponent(q)}&session_id=${activeSid}&engine=rag_qwen`;
    // Pass token as query param since EventSource doesn't support custom headers
    const streamUrlAuth = streamUrl + `&_token=${encodeURIComponent(_token)}`;

    // Use fetch-based SSE with auth header (polyfill for EventSource auth limitation)
    const resp = await fetch(`${API_BASE}/edmentor/query/stream?question=${encodeURIComponent(q)}&session_id=${activeSid}&engine=rag_qwen`, {
      headers: { 'Authorization': 'Bearer ' + _token },
    });

    let fullText = '';

    if (resp.body) {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // keep incomplete line
        let eventType = '';
        for (const line of lines) {
          if (line.startsWith('event:')) { eventType = line.slice(6).trim(); }
          else if (line.startsWith('data:')) {
            const data = line.slice(5).trim();
            if (eventType === 'text' && data) {
              fullText += data + ' ';
              revealQueue.push(...data.split(/\s+/).filter(Boolean));
              startReveal(bubbleEl);
            } else if (eventType === 'audio' && data && !isMuted) {
              queueAudio(data);
            } else if (eventType === 'show' && data) {
              try {
                const showBlock = JSON.parse(data);
                if (!botPlaceholder.shows) botPlaceholder.shows = [];
                botPlaceholder.shows.push(showBlock);

                const msgBody = botRow.querySelector('.msg-body');
                const metaEl = msgBody.querySelector('.msg-meta');
                const showHtml = renderShowBlock(showBlock);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = showHtml.trim();
                const showNode = tempDiv.firstElementChild;
                if (metaEl) {
                  msgBody.insertBefore(showNode, metaEl);
                } else {
                  msgBody.appendChild(showNode);
                }
              } catch (e) {
                console.error("Error parsing show event:", e);
              }
            } else if (eventType === 'done') {
              break;
            }
            eventType = '';
          }
        }
      }
    }

    // Finalize
    isSending = false;
    sendBtn.disabled = textInput.value.trim().length === 0;
    textInput.focus();
    streamClosed = true;

    const duration = estimateDuration(fullText);
    const botMsg = { role: 'bot', text: fullText.trim(), time: timeStr, topic: '', duration, shows: botPlaceholder.shows || [] };
    sess.history.push(botMsg);
    _updateActiveSession(sess.history);

    const metaEl = botRow.querySelector('.msg-meta');
    if (metaEl) {
      metaEl.innerHTML = `${timeStr}<span class="duration-badge">${duration}</span><button class="btn-play" title="Play">▶</button>`;
      const playBtn = metaEl.querySelector('.btn-play');
      playBtn.addEventListener('click', () => speakText(fullText.trim(), playBtn));
      if (isPlayingAudio || audioQueue.length > 0) { playBtn.classList.add('playing'); currentPlayBtn = playBtn; }
    }
    scrollBottom();

  } catch (err) {
    hideTyping();
    const errMsg = { role: 'bot', text: 'I could not connect right now. That is on me. Try again in a moment.', time: timeStr, topic: '', duration: '~4s' };
    const sess2 = _getActive();
    sess2.history.push(errMsg);
    _updateActiveSession(sess2.history);
    appendBubble(errMsg);
    isSending = false;
    sendBtn.disabled = textInput.value.trim().length === 0;
    textInput.focus();
    scrollBottom();
  }
}

function estimateDuration(text) {
  const words = text.trim().split(/\s+/).length;
  return `~${Math.max(1, Math.round(words / 3.5))}s`;
}

// ── Reveal text word by word ──────────────────────────────────────────────
function startReveal(bubbleEl) {
  if (revealTimer) return;
  const speed = isMuted ? 50 : 75;
  revealTimer = setInterval(() => {
    if (!revealQueue.length) { if (streamClosed) { clearInterval(revealTimer); revealTimer = null; } return; }
    const word = revealQueue.shift();
    revealedText += (revealedText ? ' ' : '') + word;
    bubbleEl.innerText = revealedText;
    scrollBottom();
  }, speed);
}

// ── TTS ───────────────────────────────────────────────────────────────────
async function speakText(text, btn) {
  if (isMuted) return;
  stopSpeaking();
  const bodyEl = btn.closest('.msg-body'); if (!bodyEl) return;
  const bubbleEl = bodyEl.querySelector('.bubble'); if (!bubbleEl) return;
  revealQueue = []; revealedText = ''; streamClosed = true;
  if (revealTimer) { clearInterval(revealTimer); revealTimer = null; }
  revealQueue.push(...text.trim().split(/\s+/).filter(Boolean));
  bubbleEl.innerText = '';
  startReveal(bubbleEl);
  btn.classList.add('playing'); currentPlayBtn = btn;
  try {
    const resp = await fetch('/edmentor/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice: 'af_heart', speed: 0.95 }),
    });
    if (!resp.ok) { btn.classList.remove('playing'); return; }
    const ct = resp.headers.get('content-type') || '';
    if (!ct.includes('audio')) { btn.classList.remove('playing'); return; }
    const buf = await resp.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let binary = '';
    for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
    queueAudio(btoa(binary));
  } catch { btn.classList.remove('playing'); }
}

function stopSpeaking() {
  stopPlayingAudio();
  revealQueue = []; revealedText = ''; streamClosed = true;
  if (revealTimer) { clearInterval(revealTimer); revealTimer = null; }
  currentBubbleEl = null;
  if (currentPlayBtn) { currentPlayBtn.classList.remove('playing'); currentPlayBtn = null; }
  waveform.classList.remove('active');
}

// ── Mute ──────────────────────────────────────────────────────────────────
function toggleMute() {
  isMuted = !isMuted;
  localStorage.setItem(MUTE_KEY, isMuted);
  if (isMuted) stopSpeaking();
  updateMuteUI();
}
function updateMuteUI() {
  muteBtn.textContent = isMuted ? '🔇' : '🔊';
  muteBtn.className   = isMuted ? 'btn-icon muted' : 'btn-icon';
  muteBtn.title       = isMuted ? 'Unmute voice output' : 'Mute voice output';
}

// ── STT ───────────────────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function toggleMic() {
  if (!SpeechRecognition) { alert('Microphone not supported. Use Chrome/Edge or type your question.'); return; }
  isListening ? stopListening() : startListening();
}

function startListening() {
  if (isListening) return;
  stopSpeaking();
  recognition = new SpeechRecognition();
  recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'en-US';
  recognition.onstart = () => { isListening = true; micBtn.classList.add('listening'); micBtn.textContent = '⏹'; setSttLive('Listening… speak your question', true); };
  recognition.onresult = e => {
    clearTimeout(silenceTimer);
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t; else interim += t;
    }
    const display = (final + interim).trim();
    if (display) setSttLive(`"${display}"`, true);
    if (final.trim()) { textInput.value = final.trim(); sendBtn.disabled = false; }
    silenceTimer = setTimeout(() => { if (textInput.value.trim()) { stopListening(); sendMessage(); } }, 2500);
  };
  recognition.onerror = e => { stopListening(); if (e.error === 'not-allowed') setSttLive('Microphone access denied.', true); };
  recognition.onend = () => { if (isListening) stopListening(); };
  try { recognition.start(); } catch { isListening = false; }
}

function stopListening() {
  clearTimeout(silenceTimer); isListening = false;
  if (recognition) { try { recognition.stop(); } catch {} recognition = null; }
  micBtn.classList.remove('listening', 'processing'); micBtn.textContent = '🎤';
  setSttLive('', false);
}

function setSttLive(text, visible) {
  sttLive.textContent = text; sttLive.className = 'stt-live' + (visible ? ' visible' : '');
}

// ── Clear conversation ────────────────────────────────────────────────────
async function clearConversation() {
  if (!confirm('Clear this chat?')) return;
  stopSpeaking();
  const sess = _getActive();
  sess.history = []; sess.name = 'New Chat'; sess.ts = Date.now();
  _saveSessions(sessions);
  renderSessions();
  renderAll([]);
  document.getElementById('session-name-display').textContent = 'New Chat';
  try { await fetch(`${API_BASE}/edmentor/session/${activeSid}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + _token } }); } catch {}
  textInput.value = ''; sendBtn.disabled = true; textInput.focus();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
