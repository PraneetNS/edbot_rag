<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edmentor — Your Engineering Mentor</title>
  <meta name="description" content="Edmentor is a voice-first AI engineering mentor for 2nd, 3rd, and 4th year students. Ask anything about DSA, placements, resume, career, and projects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07080f;
      --surface:      #0d0f1a;
      --card:         #12141f;
      --card-hover:   #171926;
      --border:       rgba(255,255,255,0.07);
      --border-glow:  rgba(124, 58, 237, 0.35);
      --accent:       #7c3aed;       /* violet */
      --accent-light: #a78bfa;
      --accent2:      #f59e0b;       /* amber — mentor warmth */
      --accent2-muted:rgba(245,158,11,0.12);
      --text:         #f1f5f9;
      --text-muted:   #64748b;
      --text-dim:     #94a3b8;
      --success:      #10b981;
      --error:        #ef4444;
      --font-ui:      'Inter', sans-serif;
      --font-title:   'Plus Jakarta Sans', sans-serif;
      --radius-lg:    20px;
      --radius-md:    14px;
      --radius-sm:    8px;
    }

    html, body {
      height: 100%;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated background ─────────────────────────────────────── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: -120px; left: -100px;
      animation: orb-drift 18s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 70%);
      bottom: -80px; right: -60px;
      animation: orb-drift 22s ease-in-out infinite alternate-reverse;
    }
    @keyframes orb-drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      background: rgba(7, 8, 15, 0.7);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-logo {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(124,58,237,0.3);
      flex-shrink: 0;
      position: relative;
    }
    .avatar-logo::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(79,70,229,0.2));
      z-index: -1;
    }

    .brand-text h1 {
      font-family: var(--font-title);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.4px;
      background: linear-gradient(to right, #f1f5f9, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-text .tagline {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: default;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .status-dot.online  { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse-dot 2.5s infinite; }
    .status-dot.fallback { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse-dot 2.5s infinite; }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all 0.2s;
    }
    .btn-icon:hover {
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    /* ── Chat messages area ───────────────────────────────────────── */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }
    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }

    /* ── Welcome screen ─────────────────────────────────────────── */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 28px;
      padding: 20px;
      animation: fade-up 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome-avatar {
      width: 88px; height: 88px;
      border-radius: 26px;
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(79,70,229,0.08));
      border: 1px solid rgba(124,58,237,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px;
      animation: float 5s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(124,58,237,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    .welcome-screen h2 {
      font-family: var(--font-title);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.6px;
      background: linear-gradient(135deg, #f1f5f9 0%, #a78bfa 60%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.25;
    }
    .welcome-screen p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 400px;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 480px;
    }
    .chip {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12.5px;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover {
      border-color: rgba(124,58,237,0.4);
      background: rgba(124,58,237,0.06);
      color: var(--accent-light);
      transform: translateY(-1px);
    }

    .mic-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--accent2-muted);
      border: 1px solid rgba(245,158,11,0.15);
      padding: 8px 16px;
      border-radius: 20px;
    }

    /* ── Message bubbles ────────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 12px;
      animation: msg-in 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; align-self: flex-end; max-width: 85%; }
    .msg-row.bot  { align-self: flex-start; max-width: 90%; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-row.user .msg-avatar {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      box-shadow: 0 2px 10px rgba(124,58,237,0.25);
    }
    .msg-row.bot .msg-avatar {
      background: linear-gradient(135deg, #1e2030, #131526);
      border: 1px solid var(--border);
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .msg-row.user .msg-body { align-items: flex-end; }
    .msg-row.bot  .msg-body { align-items: flex-start; }

    .bubble {
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.65;
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(124,58,237,0.15);
    }
    .msg-row.bot .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10.5px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .duration-badge {
      background: var(--accent2-muted);
      border: 1px solid rgba(245,158,11,0.15);
      color: var(--accent2);
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }

    .topic-badge {
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      color: var(--accent-light);
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* TTS play button on bot messages */
    .btn-play {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }
    .btn-play:hover { color: var(--accent-light); }
    .btn-play.playing { color: var(--accent); animation: speaking-pulse 1s infinite; }
    @keyframes speaking-pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Typing indicator ─────────────────────────────────────────── */
    .typing-row {
      display: flex;
      gap: 12px;
      align-self: flex-start;
    }
    .typing-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .typing-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    .dots {
      display: flex;
      gap: 4px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot-bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dot-bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input zone ──────────────────────────────────────────────── */
    .input-zone {
      padding: 20px 28px 28px;
      border-top: 1px solid var(--border);
      background: rgba(7, 8, 15, 0.8);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input-box {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: rgba(124,58,237,0.5);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }

    #text-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      padding-top: 2px;
    }
    #text-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 10px rgba(124,58,237,0.3);
    }
    #send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(124,58,237,0.4); }
    #send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── MIC button — primary CTA ─────────────────────────────────── */
    #mic-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(124,58,237,0.3);
      background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(79,70,229,0.06));
      color: var(--accent-light);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      transition: all 0.25s;
      position: relative;
    }
    #mic-btn:hover {
      border-color: var(--accent);
      background: rgba(124,58,237,0.18);
      transform: scale(1.05);
    }
    #mic-btn.listening {
      background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.08));
      border-color: #ef4444;
      color: #ef4444;
      animation: mic-pulse 1.2s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
    }
    #mic-btn.processing {
      border-color: var(--accent2);
      color: var(--accent2);
      animation: mic-spin 1s linear infinite;
    }
    @keyframes mic-spin {
      to { transform: rotate(360deg); }
    }

    /* ── STT live transcript ──────────────────────────────────────── */
    .stt-live {
      min-height: 18px;
      font-size: 12px;
      color: var(--accent-light);
      text-align: center;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      font-style: italic;
    }
    .stt-live.visible { opacity: 1; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .input-hint kbd {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: var(--font-ui);
    }

    /* ── Speaking waveform overlay ────────────────────────────────── */
    .waveform-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 20px;
      margin-bottom: 6px;
    }
    .waveform-bar.active { display: flex; }
    .wave-line {
      width: 3px;
      border-radius: 2px;
      background: var(--accent-light);
      animation: wave-anim 0.8s ease-in-out infinite alternate;
    }
    .wave-line:nth-child(2) { animation-delay: 0.1s; }
    .wave-line:nth-child(3) { animation-delay: 0.2s; }
    .wave-line:nth-child(4) { animation-delay: 0.3s; }
    .wave-line:nth-child(5) { animation-delay: 0.4s; }
    @keyframes wave-anim {
      from { height: 4px; opacity: 0.4; }
      to   { height: 18px; opacity: 1; }
    }

    /* ── Mute toggle ─────────────────────────────────────────────── */
    #mute-btn {
      position: fixed;
      bottom: 100px;
      right: calc(50% - 390px + 16px);
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all 0.2s;
      z-index: 10;
    }
    #mute-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
    #mute-btn.muted { color: var(--error); border-color: rgba(239,68,68,0.3); }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .app { max-width: 100%; }
      header { padding: 14px 18px; }
      .messages-wrap { padding: 20px 18px; }
      .input-zone { padding: 14px 18px 22px; }
      #mute-btn { right: 16px; }
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app">

  <!-- Header -->
  <header>
    <div class="header-brand">
      <div class="avatar-logo">🎓</div>
      <div class="brand-text">
        <h1>Edmentor</h1>
        <div class="tagline">Engineering Mentor · Voice First</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill" id="status-pill" title="System status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-label">Connecting…</span>
      </div>
      <button class="btn-icon" id="clear-btn" title="Clear conversation" onclick="clearConversation()">🗑️</button>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages-wrap" id="messages">
    <!-- Welcome screen shown when no history -->
  </div>

  <!-- Waveform (shown while TTS is speaking) -->
  <div class="waveform-bar" id="waveform">
    <div class="wave-line" style="height:8px"></div>
    <div class="wave-line" style="height:14px"></div>
    <div class="wave-line" style="height:18px"></div>
    <div class="wave-line" style="height:12px"></div>
    <div class="wave-line" style="height:6px"></div>
  </div>

  <!-- Input zone -->
  <div class="input-zone">
    <div class="input-row">
      <div class="input-box">
        <textarea id="text-input" rows="1" placeholder="Type your question, or tap the mic…"></textarea>
        <button id="send-btn" onclick="sendMessage()" disabled title="Send">➤</button>
      </div>
      <button id="mic-btn" onclick="toggleMic()" title="Hold to speak (2.5s silence auto-sends)">🎤</button>
    </div>
    <div class="stt-live" id="stt-live"></div>
    <div class="input-hint">
      <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> new line · Mic auto-sends after 2.5s silence
    </div>
  </div>

</div>

<!-- Mute TTS button -->
<button id="mute-btn" onclick="toggleMute()" title="Toggle voice output">🔊</button>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  EDMENTOR VOICE-FIRST UI
// ═══════════════════════════════════════════════════════════════════════════

const API_BASE    = '';
const SESSION_KEY = 'edmentor_session_id';
const HISTORY_KEY = 'edmentor_history';
const MUTE_KEY    = 'edmentor_muted';

// ── State ─────────────────────────────────────────────────────────────────
let sessionId     = localStorage.getItem(SESSION_KEY) || _newSessionId();
let chatHistory   = _loadHistory();
let isMuted       = localStorage.getItem(MUTE_KEY) === 'true';
let isListening   = false;
let isSending     = false;
let recognition   = null;
let silenceTimer  = null;
let currentUtterance = null;

// Speech queue & text reveal state variables
let speechQueue     = [];
let isSpeakingQueue = false;
let revealedText    = "";
let streamClosed    = false;
let currentBubbleEl = null;
let currentPlayBtn  = null;
let revealQueue     = [];
let revealTimer     = null;

function _newSessionId() {
  const id = 'em_' + Math.random().toString(36).slice(2,9) + '_' + Date.now();
  localStorage.setItem(SESSION_KEY, id);
  return id;
}

function _loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function _saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(chatHistory)); } catch {}
}

// ── DOM refs ──────────────────────────────────────────────────────────────
const messagesEl   = document.getElementById('messages');
const textInput    = document.getElementById('text-input');
const sendBtn      = document.getElementById('send-btn');
const micBtn       = document.getElementById('mic-btn');
const sttLive      = document.getElementById('stt-live');
const statusDot    = document.getElementById('status-dot');
const statusLabel  = document.getElementById('status-label');
const muteBtn      = document.getElementById('mute-btn');
const waveform     = document.getElementById('waveform');

// ── Startup ───────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Pre-warm SpeechSynthesis voices
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.getVoices();
    };
  }

  updateMuteUI();
  checkHealth();
  setInterval(checkHealth, 15000);
  renderAll();

  textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = textInput.value.trim().length === 0;
  });

  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

// ── Health check ─────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const res  = await fetch(`${API_BASE}/edmentor/health`);
    const data = await res.json();
    if (data.ready && data.qwen_available) {
      statusDot.className   = 'status-dot online';
      statusLabel.textContent = 'Qwen Local';
    } else if (data.ready) {
      statusDot.className   = 'status-dot fallback';
      statusLabel.textContent = 'RAG Local';
    } else {
      statusDot.className   = 'status-dot';
      statusLabel.textContent = 'Offline';
    }
  } catch {
    statusDot.className   = 'status-dot';
    statusLabel.textContent = 'Offline';
  }
}

// ── Render all messages ──────────────────────────────────────────────────
function renderAll() {
  messagesEl.innerHTML = '';

  if (chatHistory.length === 0) {
    renderWelcome();
    return;
  }

  chatHistory.forEach(msg => appendBubble(msg));
  scrollBottom();
}

function renderWelcome() {
  const el = document.createElement('div');
  el.className = 'welcome-screen';
  el.id = 'welcome-screen';
  el.innerHTML = `
    <div class="welcome-avatar">🎓</div>
    <h2>Your engineering mentor is ready.</h2>
    <p>Ask me anything about DSA, placements, resume, career planning, or projects. I will guide you like a senior engineer, not lecture you.</p>
    <div class="welcome-chips">
      <div class="chip" onclick="quickAsk('how do I start with DSA?')">How to start DSA?</div>
      <div class="chip" onclick="quickAsk('what should I do in my 3rd year?')">3rd year roadmap</div>
      <div class="chip" onclick="quickAsk('how do I get my first internship?')">First internship</div>
      <div class="chip" onclick="quickAsk('what projects should I build?')">Project ideas</div>
      <div class="chip" onclick="quickAsk('how do I crack placements?')">Crack placements</div>
      <div class="chip" onclick="quickAsk('should I do masters or get a job?')">Masters vs job</div>
    </div>
    <div class="mic-hint">
      🎤 Tap the mic button and speak your question
    </div>
  `;
  messagesEl.appendChild(el);
}

function quickAsk(text) {
  textInput.value = text;
  sendBtn.disabled = false;
  sendMessage();
}

// ── Append bubble to DOM ──────────────────────────────────────────────────
function appendBubble(msg) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;

  const avatarEmoji = msg.role === 'user' ? '👤' : '🎓';
  const metaHtml = buildMeta(msg);

  row.innerHTML = `
    <div class="msg-avatar">${avatarEmoji}</div>
    <div class="msg-body">
      <div class="bubble">${escapeHtml(msg.text)}</div>
      ${metaHtml}
    </div>
  `;

  // Attach TTS play button handler for bot messages
  if (msg.role === 'bot') {
    const playBtn = row.querySelector('.btn-play');
    if (playBtn) {
      playBtn.addEventListener('click', () => speakText(msg.text, playBtn));
    }
  }

  messagesEl.appendChild(row);
  return row;
}

function buildMeta(msg) {
  if (msg.role === 'user') {
    return `<div class="msg-meta">${msg.time}</div>`;
  }
  const durationHtml = msg.duration
    ? `<span class="duration-badge">${msg.duration}</span>` : '';
  const topicHtml = msg.topic && msg.topic !== 'General' && msg.topic !== 'general'
    ? `<span class="topic-badge">${msg.topic}</span>` : '';
  return `
    <div class="msg-meta">
      ${msg.time}
      ${durationHtml}
      ${topicHtml}
      <button class="btn-play" title="Play response">▶</button>
    </div>
  `;
}

// ── Typing indicator ──────────────────────────────────────────────────────
function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing-row';
  el.id = 'typing-indicator';
  el.innerHTML = `
    <div class="msg-avatar" style="background:linear-gradient(135deg,#1e2030,#131526);border:1px solid rgba(255,255,255,0.07);">🎓</div>
    <div class="typing-bubble">
      <span class="typing-label">Edmentor is thinking</span>
      <div class="dots">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>
  `;
  messagesEl.appendChild(el);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

let audioQueue = [];
let isPlayingAudio = false;
let currentPlayingAudio = null;

function queueAudio(base64Wav) {
  if (isMuted) return;
  try {
    const binaryString = atob(base64Wav);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
      bytes[i] = binaryString.charCodeAt(i);
    }
    const blob = new Blob([bytes], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    audioQueue.push(url);
    if (!isPlayingAudio) {
      playNextAudio();
    }
  } catch (err) {
    console.error('Error in queueAudio:', err);
  }
}

function playNextAudio() {
  if (audioQueue.length === 0) {
    isPlayingAudio = false;
    waveform.classList.remove('active');
    document.querySelectorAll('.btn-play.playing').forEach(b => b.classList.remove('playing'));
    return;
  }
  
  if (window.speechSynthesis && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
  }
  
  isPlayingAudio = true;
  waveform.classList.add('active');
  const url = audioQueue.shift();
  
  const audio = new Audio(url);
  currentPlayingAudio = audio;
  
  // Highlight the current bot play button
  const playBtns = document.querySelectorAll('.btn-play');
  const lastPlayBtn = playBtns[playBtns.length - 1];
  if (lastPlayBtn) {
    lastPlayBtn.classList.add('playing');
  }
  
  audio.onended = () => {
    URL.revokeObjectURL(url);
    currentPlayingAudio = null;
    playNextAudio();
  };
  
  audio.onerror = () => {
    URL.revokeObjectURL(url);
    currentPlayingAudio = null;
    playNextAudio();
  };
  
  audio.play().catch(err => {
    console.error('Audio play error:', err);
    URL.revokeObjectURL(url);
    currentPlayingAudio = null;
    playNextAudio();
  });
}

function stopPlayingAudio() {
  if (currentPlayingAudio) {
    currentPlayingAudio.pause();
    currentPlayingAudio = null;
  }
  audioQueue = [];
  isPlayingAudio = false;
  waveform.classList.remove('active');
  document.querySelectorAll('.btn-play.playing').forEach(b => b.classList.remove('playing'));
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const q = textInput.value.trim();
  if (!q || isSending) return;

  isSending = true;
  sendBtn.disabled = true;
  textInput.value = '';
  textInput.style.height = 'auto';

  // Remove welcome screen
  const ws = document.getElementById('welcome-screen');
  if (ws) ws.remove();

  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  // Show user bubble immediately
  const userMsg = { role: 'user', text: q, time: timeStr };
  chatHistory.push(userMsg);
  _saveHistory();
  appendBubble(userMsg);
  scrollBottom();

  showTyping();

  try {
    // Cancel any ongoing speaking / queue
    stopSpeaking();

    // Create bot bubble for streaming
    const botPlaceholder = { role: 'bot', text: '', time: timeStr, topic: '', duration: '' };
    const botRow = appendBubble(botPlaceholder);
    const bubbleEl = botRow.querySelector('.bubble');
    bubbleEl.innerText = ''; // Ensure it starts empty

    // Reset queue state for this stream
    speechQueue = [];
    isSpeakingQueue = false;
    revealedText = "";
    streamClosed = false;
    currentBubbleEl = bubbleEl;
    currentPlayBtn = null;
    revealQueue = [];
    if (revealTimer) {
      clearInterval(revealTimer);
      revealTimer = null;
    }

    hideTyping();

    // Connect to single unified GET-based SSE stream
    const streamUrl = `${API_BASE}/edmentor/query/stream?question=${encodeURIComponent(q)}&session_id=${sessionId}`;
    const eventSource = new EventSource(streamUrl);
    let fullText = '';

    eventSource.addEventListener('text', (e) => {
      const sentence = e.data.trim();
      if (!sentence) return;

      fullText += sentence + " ";

      // Feed visual reveal queue
      const words = sentence.split(/\s+/).filter(Boolean);
      revealQueue.push(...words);
      startReveal(bubbleEl);

      if (!isMuted) {
        // Feed Speech Queue for background voice
        speechQueue.push(sentence);
        processSpeechQueue(null);
      }
    });

    eventSource.addEventListener('audio', (e) => {
      // Bypassed: backend audio events are ignored in favor of browser-native SpeechSynthesis
    });

    eventSource.addEventListener('done', (e) => {
      eventSource.close();
      finalizeStream();
    });

    eventSource.addEventListener('error', (e) => {
      console.error('SSE Stream error:', e);
      eventSource.close();
      finalizeStream();
    });

    function finalizeStream() {
      isSending = false;
      sendBtn.disabled = textInput.value.trim().length === 0;
      textInput.focus();

      const duration = estimateDuration(fullText);

      // Update history entry
      const botMsg = { role: 'bot', text: fullText.trim(), time: timeStr, topic: '', duration };
      chatHistory.push(botMsg);
      _saveHistory();

      // Update the meta row
      const metaEl = botRow.querySelector('.msg-meta');
      if (metaEl) {
        metaEl.innerHTML = `
          ${timeStr}
          <span class="duration-badge">${duration}</span>
          <button class="btn-play" title="Play response">▶</button>
        `;
        const playBtn = metaEl.querySelector('.btn-play');
        playBtn.addEventListener('click', () =>
          speakText(fullText.trim(), playBtn)
        );

        // If SpeechSynthesis is still speaking, link this button to active queue
        if (isSpeakingQueue || speechQueue.length > 0) {
          playBtn.classList.add('playing');
          currentPlayBtn = playBtn;
        }
      }
      scrollBottom();

      streamClosed = true;
      // If we are muted or already done speaking and finished typing, deactivate waveform
      if (isMuted || (!isSpeakingQueue && speechQueue.length === 0 && revealQueue.length === 0)) {
        waveform.classList.remove('active');
      }
    }

  } catch (err) {
    hideTyping();
    console.error('Edmentor query error:', err);
    const errMsg = {
      role: 'bot',
      text: 'I could not connect right now. That is on me, not you. Try again in a moment.',
      time: timeStr,
      topic: '',
      duration: '~4s',
    };
    chatHistory.push(errMsg);
    _saveHistory();
    appendBubble(errMsg);
    isSending = false;
    sendBtn.disabled = textInput.value.trim().length === 0;
    textInput.focus();
    scrollBottom();
  }
}

function estimateDuration(text) {
  const wps = 3.5;
  const words = text.trim().split(/\s+/).length;
  const sec = Math.max(1, Math.round(words / wps));
  return `~${sec}s`;
}

// ── TTS (Text-to-Speech) ─────────────────────────────────────────────────
function startReveal(bubbleEl) {
  if (revealTimer) return;

  const speed = isMuted ? 50 : 75;
  revealTimer = setInterval(() => {
    if (revealQueue.length === 0) {
      if (streamClosed) {
        clearInterval(revealTimer);
        revealTimer = null;
      }
      return;
    }

    const word = revealQueue.shift();
    revealedText += (revealedText ? " " : "") + word;
    bubbleEl.innerText = revealedText;
    scrollBottom();
  }, speed);
}

async function speakText(text, btn) {
  if (isMuted) return;

  // Stop any current speech and reveal timers
  stopSpeaking();

  const bodyEl = btn.closest('.msg-body');
  if (!bodyEl) return;
  const bubbleEl = bodyEl.querySelector('.bubble');
  if (!bubbleEl) return;

  // Reset state for replay reveal
  revealQueue = [];
  revealedText = "";
  streamClosed = true;
  if (revealTimer) {
    clearInterval(revealTimer);
    revealTimer = null;
  }

  // Split text into words and push to revealQueue
  const words = text.trim().split(/\s+/).filter(Boolean);
  revealQueue.push(...words);

  // Clear bubble text to start word-by-word reveal
  bubbleEl.innerText = "";

  // Reset speech queue for replay speech
  speechQueue = [];
  isSpeakingQueue = false;

  const sentences = text.split(/(?<=[.!?])\s+/);
  for (const s of sentences) {
    const ts = s.trim();
    if (ts) speechQueue.push(ts);
  }

  // Start both typing reveal and voice playback in parallel
  startReveal(bubbleEl);
  processSpeechQueue(btn);
}

function processSpeechQueue(btn) {
  if (isSpeakingQueue) return;
  if (speechQueue.length === 0) {
    if (streamClosed) {
      waveform.classList.remove('active');
      if (btn) btn.classList.remove('playing');
      if (currentPlayBtn) currentPlayBtn.classList.remove('playing');
    }
    return;
  }

  isSpeakingQueue = true;
  waveform.classList.add('active');
  if (btn) {
    btn.classList.add('playing');
    currentPlayBtn = btn;
  }

  const sentence = speechQueue.shift();
  const utter = new SpeechSynthesisUtterance(sentence);
  utter.rate = 0.95;
  utter.pitch = 1.0;

  // Pick best English voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.toLowerCase().includes('natural') && v.lang.startsWith('en')) ||
                    voices.find(v => v.name.toLowerCase().includes('google us english')) ||
                    voices.find(v => v.name.toLowerCase().includes('google')) ||
                    voices.find(v => v.name.toLowerCase().includes('samantha')) ||
                    voices.find(v => v.name.toLowerCase().includes('microsoft david')) ||
                    voices.find(v => v.name.toLowerCase().includes('microsoft zira')) ||
                    voices.find(v => v.lang.startsWith('en-US')) ||
                    voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;

  utter.onend = () => {
    isSpeakingQueue = false;
    currentUtterance = null;
    processSpeechQueue(btn);
  };

  utter.onerror = (e) => {
    console.error('Speech synthesis error:', e);
    isSpeakingQueue = false;
    currentUtterance = null;
    processSpeechQueue(btn);
  };

  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

function _browserTTS(text, btn) {
  speakText(text, btn);
}

function stopSpeaking() {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  stopPlayingAudio();
  speechQueue = [];
  isSpeakingQueue = false;

  // Clear reveal state
  revealQueue = [];
  revealedText = "";
  streamClosed = true;
  if (revealTimer) {
    clearInterval(revealTimer);
    revealTimer = null;
  }

  currentUtterance = null;
  currentBubbleEl = null;
  if (currentPlayBtn) {
    currentPlayBtn.classList.remove('playing');
    currentPlayBtn = null;
  }
  waveform.classList.remove('active');
}

// ── Mute toggle ───────────────────────────────────────────────────────────
function toggleMute() {
  isMuted = !isMuted;
  localStorage.setItem(MUTE_KEY, isMuted);
  if (isMuted) stopSpeaking();
  updateMuteUI();
}

function updateMuteUI() {
  muteBtn.textContent = isMuted ? '🔇' : '🔊';
  muteBtn.className   = 'btn-icon' + (isMuted ? ' muted' : '');
  muteBtn.title       = isMuted ? 'Unmute voice output' : 'Mute voice output';
}

// ── Speech Recognition (STT) ──────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function toggleMic() {
  if (!SpeechRecognition) {
    alert('Your browser does not support microphone input. Please use Chrome or Edge, or type your question.');
    return;
  }

  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  if (isListening) return;

  // Stop TTS while user is speaking
  stopSpeaking();

  recognition = new SpeechRecognition();
  recognition.continuous       = true;
  recognition.interimResults   = true;
  recognition.lang             = 'en-US';
  recognition.maxAlternatives  = 1;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.textContent = '⏹';
    micBtn.title = 'Tap to stop';
    setSttLive('Listening… speak your question', true);
  };

  recognition.onresult = (event) => {
    clearTimeout(silenceTimer);

    let interim = '';
    let final   = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }

    const display = (final + interim).trim();
    if (display) setSttLive(`"${display}"`, true);

    if (final.trim()) {
      textInput.value = final.trim();
      sendBtn.disabled = false;
    }

    // 2.5-second silence auto-submit (per plan — not 1.5s)
    silenceTimer = setTimeout(() => {
      if (textInput.value.trim()) {
        stopListening();
        sendMessage();
      }
    }, 2500);
  };

  recognition.onerror = (e) => {
    console.warn('STT error:', e.error);
    stopListening();
    if (e.error === 'not-allowed') {
      setSttLive('Microphone access denied. Please allow mic permission.', true);
    }
  };

  recognition.onend = () => {
    // If user didn't stop manually and there's text, submit
    if (isListening) {
      stopListening();
    }
  };

  try {
    recognition.start();
  } catch (e) {
    console.error('Recognition start error:', e);
    isListening = false;
  }
}

function stopListening() {
  clearTimeout(silenceTimer);
  isListening = false;

  if (recognition) {
    try { recognition.stop(); } catch {}
    recognition = null;
  }

  micBtn.classList.remove('listening', 'processing');
  micBtn.textContent = '🎤';
  micBtn.title = 'Hold to speak (2.5s silence auto-sends)';
  setSttLive('', false);
}

function setSttLive(text, visible) {
  sttLive.textContent = text;
  sttLive.className = 'stt-live' + (visible ? ' visible' : '');
}

// ── Clear conversation ────────────────────────────────────────────────────
async function clearConversation() {
  if (!confirm('Clear your conversation with Edmentor?')) return;

  stopSpeaking();
  chatHistory = [];
  _saveHistory();
  renderAll();

  try {
    await fetch(`${API_BASE}/edmentor/session/${sessionId}`, { method: 'DELETE' });
  } catch {}

  // New session
  sessionId = _newSessionId();
  textInput.value = '';
  sendBtn.disabled = true;
  textInput.focus();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}
